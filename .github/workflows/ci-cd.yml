name: 🚀 CI/CD Pipeline — Solar Panel Cleaner

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_HUB_USERNAME }}/solar-cleaner-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_HUB_USERNAME }}/solar-cleaner-frontend

jobs:
  # ============================================================
  # JOB 1: Lint & Test Backend (Python/Flask)
  # ============================================================
  test-backend:
    name: 🐍 Test & Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: 🔍 Lint with flake8
        run: |
          # Hentikan build jika ada syntax error atau undefined names
          flake8 backend.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Peringatan untuk code quality (tidak menghentikan build)
          flake8 backend.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🧪 Run unit tests
        run: pytest test_backend.py -v --tb=short

  # ============================================================
  # JOB 2: Lint & Build Frontend (React/Vite)
  # ============================================================
  test-frontend:
    name: ⚛️ Test & Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint with ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ============================================================
  # JOB 3: Build & Push Docker Images ke Docker Hub
  # Hanya berjalan saat push ke branch 'main'
  # ============================================================
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract metadata (tags & labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🏷️ Extract metadata frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🐳 Build & Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend.Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend.Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Pipeline Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ env.IMAGE_BACKEND }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.IMAGE_FRONTEND }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Images berhasil dipush ke Docker Hub!" >> $GITHUB_STEP_SUMMARY
